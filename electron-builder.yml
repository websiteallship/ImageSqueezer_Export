appId: com.imagesqueezer.app
productName: ImageSqueezer
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

asar: true
compression: maximum

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  category: public.app-category.photography
  target:
    - target: dmg
      arch: [x64, arm64]

linux:
  target:
    - target: AppImage
  category: Graphics
